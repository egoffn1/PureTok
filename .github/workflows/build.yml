      - name: List files
        run: ls -la
      
      - name: Build
        run: |
          VERSION="${{ github.event.inputs.tiktok_version }}"
          java -jar revanced-cli.jar patch \
            --input tiktok.apk \
            --output "PureTok-v${VERSION}.apk" \
            --patch-bundle revanced-patches.rvp \
            --integrations revanced-integrations.apk || echo "Build failed - check patches compatibility"
      
      - name: Upload artifact
        run: ls -la PureTok*.apk 2>/dev/null && echo "=== Build Complete ===" || echo "No APK produced"
      
      - name: Upload artifact ( Success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PureTok-v${{ github.event.inputs.tiktok_version }}
          path: PureTok*.apk
          retention-days: 30
      
      - name: Create Release
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.inputs.tiktok_version }}"
          if [ -f "PureTok-v${VERSION}.apk" ]; then
            gh release upload "${{ github.ref_name }}" "PureTok-v${VERSION}.apk" --clobber
          fi