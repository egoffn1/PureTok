name: Build PureTok APK

on:
  workflow_dispatch:
    inputs:
      tiktok_version:
        description: 'TikTok version (e.g. 34.5.3)'
        required: true
        default: '34.5.3'
        type: string
      remove_watermark:
        description: 'Remove watermark (DANGEROUS - may ban!)'
        required: true
        default: 'false'
        type: boolean
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Download ReVanced CLI
        run: |
          curl -sL "https://github.com/revanced/revanced-cli/releases/latest/download/revanced-cli-all-in-one.jar" -o revanced-cli.jar
          ls -la revanced-cli.jar
      
      - name: Download ReVanced Patches
        run: |
          curl -sL "https://github.com/revanced/revanced-patches/releases/latest/download/revanced-patches-all-in-one.rvp" -o revanced-patches.rvp
          ls -la revanced-patches.rvp
      
      - name: Download ReVanced Integrations
        run: |
          curl -sL "https://github.com/revanced/revanced-integrations/releases/latest/download/revanced-integrations-all-in-one.apk" -o revanced-integrations.apk
          ls -la revanced-integrations.apk
      
      - name: Get TikTok APK
        run: |
          VERSION="${{ github.event.inputs.tiktok_version }}"
          if [ -f "tiktok-$VERSION.apk" ]; then
            cp "tiktok-$VERSION.apk" tiktok.apk
          elif [ -f "tiktok.apk" ]; then
            echo "Using tiktok.apk"
          else
            echo "ERROR: No TikTok APK found!"
            echo "Download TikTok from APKMirror and name it tiktok-VERSION.apk"
            exit 1
          fi
      
      - name: Build PureTok (standard)
        if: github.event.inputs.remove_watermark != 'true'
        run: |
          VERSION="${{ github.event.inputs.tiktok_version }}"
          java -jar revanced-cli.jar patch \
            --input tiktok.apk \
            --output "PureTok-v${VERSION}.apk" \
            --patch-bundle revanced-patches.rvp \
            --integrations revanced-integrations.apk || true
      
      - name: Build PureTok (with watermark removal)
        if: github.event.inputs.remove_watermark == 'true'
        run: |
          VERSION="${{ github.event.inputs.tiktok_version }}"
          echo "WARNING: Building with watermark removal!"
          java -jar revanced-cli.jar patch \
            --input tiktok.apk \
            --output "PureTok-v${VERSION}-NOWM.apk" \
            --patch-bundle revanced-patches.rvp \
            --integrations revanced-integrations.apk || true
      
      - name: Check result
        run: |
          ls -lh PureTok*.apk 2>/dev/null || echo "No APK built - check errors above"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureTok-v${{ github.event.inputs.tiktok_version }}
          path: PureTok*.apk
          retention-days: 30
      
      - name: Create Release
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.inputs.tiktok_version }}"
          if [ -f "PureTok-v${VERSION}.apk" ]; then
            gh release upload "${{ github.ref_name }}" "PureTok-v${VERSION}.apk" --clobber
          fi
      
      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          ls -lh PureTok*.apk 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No APK built" >> $GITHUB_STEP_SUMMARY