name: Build PureTok APK

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download ReVanced CLI
        run: |
          curl -sL --fail "https://github.com/revanced/revanced-cli/releases/download/v6.0.0/revanced-cli.jar" -o revanced-cli.jar || curl -sL --fail "https://github.com/revanced/revanced-cli/releases/latest/download/revanced-cli-all-in-one.jar" -o revanced-cli.jar
          ls -la revanced-cli.jar
          file revanced-cli.jar
      
      - name: Download ReVanced Patches
        run: |
          curl -sL --fail "https://github.com/revanced/revanced-patches/releases/download/v6.0.0/revanced-patches.rvp" -o revanced-patches.rvp || curl -sL --fail "https://github.com/revanced/revanced-patches/releases/latest/download/revanced-patches-all-in-one.rvp" -o revanced-patches.rvp
          ls -la revanced-patches.rvp
      
      - name: Download ReVanced Integrations
        run: |
          curl -sL --fail "https://github.com/revanced/revanced-integrations/releases/latest/download/revanced-integrations.apk" -o revanced-integrations.apk
          ls -la revanced-integrations.apk
      
      - name: Get TikTok APK
        run: |
          if ls tiktok*.apk 2>/dev/null | head -1 | grep -q .; then
            cp tiktok*.apk tiktok.apk
          else
            echo "Downloading TikTok from release..."
            curl -sL "https://github.com/egoffn1/PureTok/releases/download/v45.0.42/tiktok-45-0-42.apk" -o tiktok.apk
          fi
          ls -la tiktok.apk
          file tiktok.apk
      
      - name: Build
        run: |
          echo "Building PureTok..."
          java -jar revanced-cli.jar patch \
            --input tiktok.apk \
            --output "PureTok.apk" \
            --patch-bundle revanced-patches.rvp \
            --integrations revanced-integrations.apk || echo "Build note: check output"
      
      - name: List output
        run: ls -la *.apk
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureTok
          path: PureTok.apk
          retention-days: 30
      
      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          if [ -f "PureTok.apk" ]; then
            gh release upload "${{ github.ref_name }}" PureTok.apk --clobber
          fi