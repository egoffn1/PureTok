name: Build PureTok APK

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download ReVanced CLI
        run: curl -sL "https://github.com/revanced/revanced-cli/releases/latest/download/revanced-cli-all-in-one.jar" -o revanced-cli.jar
      
      - name: Download ReVanced Patches
        run: curl -sL "https://github.com/revanced/revanced-patches/releases/latest/download/revanced-patches-all-in-one.rvp" -o revanced-patches.rvp
      
      - name: Download ReVanced Integrations
        run: curl -sL "https://github.com/revanced/revanced-integrations/releases/latest/download/revanced-integrations-all-in-one.apk" -o revanced-integrations.apk
      
      - name: Get TikTok APK
        run: |
          # Find tiktok APK in repo or download from release
          APK=$(ls tiktok*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" tiktok.apk
          else
            echo "No APK in repo, skipping build"
            exit 78  # Skipped
          fi
      
      - name: Build
        run: |
          java -jar revanced-cli.jar patch \
            --input tiktok.apk \
            --output "PureTok.apk" \
            --patch-bundle revanced-patches.rvp \
            --integrations revanced-integrations.apk || echo "Build may fail - check patch compatibility"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureTok
          path: PureTok.apk
          retention-days: 30
      
      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          if [ -f "PureTok.apk" ]; then
            gh release upload "${{ github.ref_name }}" PureTok.apk --clobber
          fi