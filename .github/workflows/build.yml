name: Build PureTok APK

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Download ReVanced CLI (inotia00)
        run: |
          curl -sL "https://github.com/inotia00/revanced-cli/releases/download/v5.0.2/revanced-cli-5.0.2-all.jar" -o revanced-cli.jar
          ls -la revanced-cli.jar
          file revanced-cli.jar
      
      - name: Get TikTok APK
        run: |
          curl -sL "https://github.com/egoffn1/PureTok/releases/download/v45.0.42/tiktok-45.0-42.apk" -o tiktok.apk
          ls -la tiktok.apk
      
      - name: Build with patches from repo
        run: |
          echo "Listing patches files in repo:"
          find . -name "*.rvp" -o -name "patches*" | head -10
          
          # Use patches from repo if available, otherwise download
          if ls patches/*.rvp 2>/dev/null | head -1 | grep -q .; then
            PATCHES=$(ls patches/*.rvp | head -1)
          elif [ -f "patches.rvp" ]; then
            PATCHES="patches.rvp"
          else
            echo "Downloading patches..."
            curl -sL "https://github.com/inotia00/revanced-patches/releases/download/v5.14.1/patches-5.14.1.rvp" -o patches.rvp
            PATCHES="patches.rvp"
          fi
          
          ls -la "$PATCHES"
          
          echo "Building..."
          java -jar revanced-cli.jar patch \
            --input tiktok.apk \
            --output "PureTok.apk" \
            --patch-bundle "$PATCHES" || echo "Build failed - checking TikTok support"
      
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PureTok
          path: PureTok.apk
          retention-days: 30
      
      - name: Upload to Release
        if: github.event_name == 'release' && success()
        run: |
          if [ -f "PureTok.apk" ]; then
            gh release upload "${{ github.ref_name }}" PureTok.apk --clobber
          fi