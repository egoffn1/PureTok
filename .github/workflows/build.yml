name: Build PureTok APK

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download ReVanced CLI
        run: |
          echo "Downloading ReVanced CLI..."
          curl -sL "https://github.com/revanced/revanced-cli/releases/download/v4.5.0/revanced-cli.jar" -o revanced-cli.jar || \
          curl -sL "https://github.com/revanced/revanced-cli/releases/download/v5.0.0/revanced-cli.jar" -o revanced-cli.jar || \
          curl -sL "https://github.com/revanced/revanced-cli/releases/download/v5.0.1/revanced-cli.jar" -o revanced-cli.jar
          ls -la revanced-cli.jar
      
      - name: Download ReVanced Patches
        run: |
          echo "Downloading ReVanced Patches..."
          curl -sL "https://github.com/revanced/revanced-patches/releases/download/v0.119.0/revanced-patches.rvp" -o revanced-patches.rvp || \
          curl -sL "https://github.com/revanced/revanced-patches/releases/download/latest/revanced-patches.rvp" -o revanced-patches.rvp || \
          curl -sL "https://github.com/revanced/revanced-patches/releases/download/v0.120.0/revanced-patches.rvp" -o revanced-patches.rvp
          ls -la revanced-patches.rvp
      
      - name: Download ReVanced Integrations  
        run: |
          echo "Downloading ReVanced Integrations..."
          curl -sL "https://github.com/revanced/revanced-integrations/releases/latest/download/revanced-integrations.apk" -o revanced-integrations.apk || \
          curl -sL "https://cdn.jsdelivr.net/gh/revanced/revanced-integrations/app/build/outputs/apk/release/revanced-integrations.apk" -o revanced-integrations.apk
          ls -la revanced-integrations.apk || echo "WARNING: Integrations not downloaded"
      
      - name: Get TikTok APK
        run: |
          echo "Downloading TikTok from release..."
          curl -sL "https://github.com/egoffn1/PureTok/releases/download/v45.0.42/tiktok-45-0-42.apk" -o tiktok.apk
          ls -la tiktok.apk
      
      - name: Build
        run: |
          echo "Building..."
          java -jar revanced-cli.jar patch \
            --input tiktok.apk \
            --output "PureTok.apk" \
            --patch-bundle revanced-patches.rvp \
            --integrations revanced-integrations.apk || echo "Build failed"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureTok
          path: PureTok.apk
          retention-days: 30
      
      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          if [ -f "PureTok.apk" ]; then
            gh release upload "${{ github.ref_name }}" PureTok.apk --clobber
          fi