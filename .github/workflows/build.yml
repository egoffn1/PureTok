name: Build PureTok APK

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download ReVanced CLI
        run: |
          curl -sL "https://github.com/revanced/revanced-cli/releases/download/v5.0.1/revanced-cli-5.0.1-all.jar" -o revanced-cli.jar
          ls -la revanced-cli.jar
          file revanced-cli.jar
      
      - name: Download ReVanced Patches via JSDelivr
        run: |
          curl -sL "https://cdn.jsdelivr.net/gh/revanced/revanced-patches/patches/patches.rvp" -o revanced-patches.rvp || \
          curl -sL "https://cdn.jsdelivr.net/gh/inotia00/revanced-patches/patches.rvp" -o revanced-patches.rvp || \
          echo "No patches"
          ls -la revanced-patches.rvp
          file revanced-patches.rvp
      
      - name: Download ReVanced Integrations via JSDelivr  
        run: |
          curl -sL "https://cdn.jsdelivr.net/gh/revanced/revanced-integrations/app/build/outputs/apk/release/revanced-integrations.apk" -o revanced-integrations.apk || \
          echo "No integrations"
          ls -la revanced-integrations.apk
          file revanced-integrations.apk
      
      - name: Get TikTok APK
        run: |
          curl -sL "https://github.com/egoffn1/PureTok/releases/download/v45.0.42/tiktok-45-0-42.apk" -o tiktok.apk
          ls -la tiktok.apk
      
      - name: Build
        run: |
          echo "Building..."
          ls -la
          # Пробуем разные варианты
          if [ -f "revanced-patches.rvp" ] && [ -s "revanced-patches.rvp" ]; then
            java -jar revanced-cli.jar patch \
              --input tiktok.apk \
              --output "PureTok.apk" \
              --patch-bundle revanced-patches.rvp \
              --integrations revanced-integrations.apk || echo "Build1 failed"
          else
            echo "Skipping build - no patches file"
          fi
          ls -la *.apk 2>/dev/null || echo "No APK produced"
      
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PureTok
          path: PureTok.apk
          retention-days: 30
      
      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          if [ -f "PureTok.apk" ]; then
            gh release upload "${{ github.ref_name }}" PureTok.apk --clobber
          fi