name: Build PureTok APK

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download ReVanced CLI
        run: |
          curl -sL "https://github.com/revanced/revanced-cli/releases/download/v5.0.1/revanced-cli-5.0.1-all.jar" -o revanced-cli.jar
          ls -la revanced-cli.jar
      
      - name: Download ReVanced Patches
        run: |
          # Try GitHub Packages API or direct download
          curl -sL "https://github.com/ReVanced/revanced-patches/releases/download/v6.0.0/patches-6.0.0-all-in-one.rvp" -o revanced-patches.rvp || \
          curl -sL "https://github.com/ReVanced/revanced-patches/releases/download/v5.0.0/patches-5.0.0-all-in-one.rvp" -o revanced-patches.rvp || \
          echo "Will try using CLI's built-in patches"
          ls -la revanced-patches.rvp || echo "No patches file"
      
      - name: Download ReVanced Integrations  
        run: |
          curl -sL "https://github.com/revanced/revanced-integrations/releases/download/v0.13.0/revanced-integrations-0.13.0-release.apk" -o revanced-integrations.apk || \
          curl -sL "https://github.com/revanced/revanced-integrations/releases/download/v5.0.0/revanced-integrations-5.0.0-release.apk" -o revanced-integrations.apk || \
          echo "WARNING: Will try without integrations"
          ls -la revanced-integrations.apk || echo "No integrations"
      
      - name: Get TikTok APK
        run: |
          echo "Downloading TikTok from release..."
          curl -sL "https://github.com/egoffn1/PureTok/releases/download/v45.0.42/tiktok-45-0-42.apk" -o tiktok.apk
          ls -la tiktok.apk
      
      - name: Build
        run: |
          echo "Building..."
          if [ -f "revanced-patches.rvp" ] && [ -f "revanced-integrations.apk" ]; then
            java -jar revanced-cli.jar patch \
              --input tiktok.apk \
              --output "PureTok.apk" \
              --patch-bundle revanced-patches.rvp \
              --integrations revanced-integrations.apk || echo "Build with integrations failed"
          else
            java -jar revanced-cli.jar patch \
              --input tiktok.apk \
              --output "PureTok.apk" || echo "Build failed - no patches"
          fi
          ls -la *.apk
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureTok
          path: PureTok.apk
          retention-days: 30
      
      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          if [ -f "PureTok.apk" ]; then
            gh release upload "${{ github.ref_name }}" PureTok.apk --clobber
          fi